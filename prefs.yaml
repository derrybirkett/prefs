# User Preferences Schema
# Version and last updated
$schema: https://json-schema.org/draft/2020-12/schema
version: 1.0.0
lastUpdated: 2026-03-18

# Philosophy and methodology
philosophy:
  methodology: lean
  approach: iterative
  values:
    - learning organizations
    - design thinking
    - continuous improvement
    - user-centered design
    - minimalism
    - pruning

# Spec-driven development
developmentModel:
  approach: spec-first
  description: The spec is the source of truth - define what the app should be before and during development
  principles:
    - Write the spec before writing code
    - Spec describes behavior, not implementation
    - Update spec when requirements change
    - Code must match spec, not the other way around
    - Spec is living - maintained throughout development

# Design principles
design:
  ethos: minimalism
  colors:
    primary: black
    background: white
    error: red
    success: green
    accents: none
  principles:
    - Remove all non-essential UI decorations
    - Embrace white space
    - Simplicity over complexity
    - Function over form
    - Content is king
    - Prune unused code, features, and dependencies regularly
    - Delete old stuff - if it's not used, remove it
  typography:
    style: clean
    fontPairs: minimal

# Commands (interpreted by IDE)
commands:
  wrap up:
    description: Commit all changes, tag with incremented version, push to remote, and end session
    steps:
      - git add -A
      - git commit (prompt for message)
      - git tag (increment patch)
      - git push origin main --tags
    endsSession: true
  unwraprap:
    description: Typo alias for wrap up
    aliasOf: wrap up

# Technology stack defaults
techStack:
  containerization:
    tool: docker
    default: true
    purpose: model and run all applications
    overrideConditions:
      - platform constraints
      - team preference
  buildOrder:
    - cli
    - api
    - ui
  monorepo:
    tool: NX
    default: true
    overrideConditions:
      - single small app
      - different build system required
      - team preference
  testing:
    e2e: playwright
    default: true
    overrideConditions:
      - different testing approach required
      - team preference
  ui:
    components: shadcn
    approach: copy-into-project
    default: true
  versionControl:
    system: git
    platform: github
    workflow: branch-based

# Product surfaces
productSurfaces:
  default:
    - name: marketing
      path: /
      auth: false
      description: Landing page
    - name: auth
      paths:
        - /login
        - /signup
        - /reset-password
      auth: false
      description: Authentication flow
    - name: dashboard
      path: /dashboard
      auth: true
      description: Main authenticated experience
      components:
        - user-profile-dropdown
        - navigation
        - logout-button
  optional:
    - name: blog
      path: /blog
      auth: false
      description: Content and updates
    - name: docs
      path: /docs
      auth: false
      description: Documentation site
  guidance: Add blog/docs for products with ongoing content needs

# Critical user flow that should always work
coreUserFlow:
  steps:
    - landing-page
    - login
    - dashboard
    - logout
  validation: end-to-end-test
  priority: critical

# Git workflow configuration
gitWorkflow:
  branchStrategy: feature-branch
  mainBranch: main
  protectedBranches:
    - main
  commitConvention: conventional-commits
  requirePR: true
  requireReview: true
  mergeStrategy: squash

# Automation triggers
# Note: Changelog handled by GitHub release notes (auto-generated from conventional commits)
automation:
  onCommit:
    action: update-activity-log
    enabled: true
    description: Track development activity for team context
  onPush:
    action: none
    enabled: false
    reason: GitHub release notes handle changelog automatically
  onRelease:
    action: create-blog-post
    enabled: true
    description: Generate blog post from release notes

# Source of truth for system state
sourceOfTruth: git-repository

# Issue tracking workflow
issueTracking:
  platform: github-issues
  workflow: new -> backlog -> in-progress -> review -> done
