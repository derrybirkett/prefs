# User Preferences Schema
# Version and last updated
$schema: https://json-schema.org/draft/2020-12/schema
version: 1.0.0
lastUpdated: 2026-03-17

# Philosophy and methodology
philosophy:
  methodology: lean
  approach: iterative
  values:
    - learning organizations
    - design thinking
    - continuous improvement
    - user-centered design

# Technology stack preferences
techStack:
  monorepo:
    tool: NX
    required: true
  testing:
    e2e: playwright
    required: true
  ui:
    components: shadcn
    approach: copy-into-project
  versionControl:
    system: git
    platform: github
    workflow: branch-based

# Required product surfaces that every product should have
productSurfaces:
  required:
    - name: marketing
      path: /
      auth: false
      description: Landing page

    - name: auth
      paths:
        - /login
        - /signup
        - /reset-password
      auth: false
      description: Authentication flow

    - name: dashboard
      path: /dashboard
      auth: true
      description: Main authenticated experience
      components:
        - user-profile-dropdown
        - navigation
        - logout-button

    - name: blog
      path: /blog
      auth: false
      description: Content and updates

    - name: docs
      path: /docs
      auth: false
      description: Documentation site

# Critical user flow that should always work
coreUserFlow:
  steps:
    - landing-page
    - login
    - dashboard
    - logout
  validation: end-to-end-test
  priority: critical

# Git workflow configuration
gitWorkflow:
  branchStrategy: feature-branch
  mainBranch: main
  protectedBranches:
    - main
  commitConvention: conventional-commits
  requirePR: true
  requireReview: true
  mergeStrategy: squash

# Automation triggers
# Uses GitHub native features for changelog and release notes
automation:
  onCommit:
    # Optional: local activity log hook (disabled by default)
    action: none
    enabled: false
  onPush:
    # Optional: local changelog hook (disabled by default)
    action: none
    enabled: false
  onRelease:
    # GitHub Release Notes: auto-generated from conventional commits
    # Serves as changelog AND blog post source
    action: github-release-notes
    enabled: true
    # Release notes are auto-generated by GitHub from:
    # - feat: → "Features" section
    # - fix: → "Bug Fixes" section
    # - docs: → "Documentation" section
    # - refactor: → "Other Changes" section

# Development agent stack
developmentAgents:
  stack:
    - name: strategy
      responsibility: align with vision and goals
    - name: design
      responsibility: user experience and interface
    - name: implementation
      responsibility: write production code
    - name: testing
      responsibility: quality and validation
    - name: documentation
      responsibility: docs, changelogs, blogs
    - name: devops
      responsibility: deployment and infrastructure

# Source of truth for system state
sourceOfTruth: git-repository

# Issue tracking workflow
issueTracking:
  platform: github-issues
  workflow: new -> backlog -> in-progress -> review -> done
